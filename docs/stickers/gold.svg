    <radialGradient id="shine" cx="0.32" cy="0.18" r="0.55">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <path id="arc-top" d="M 78 250 A 178 178 0 0 1 422 250" fill="none"/>
