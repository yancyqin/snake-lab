<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="Snake Lab Gold prize sticker">
  <title>Snake Lab — Gold</title>
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7c2"/>
      <stop offset="25%" stop-color="#f5c542"/>
      <stop offset="50%" stop-color="#ffe480"/>
      <stop offset="75%" stop-color="#c98a18"/>
      <stop offset="100%" stop-color="#7a5108"/>
    </linearGradient>
    <linearGradient id="rays" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd962"/>
      <stop offset="100%" stop-color="#b87a10"/>
    </linearGradient>
    <radialGradient id="field" cx="0.5" cy="0.4" r="0.75">
      <stop offset="0%" stop-color="#7a4a12"/>
      <stop offset="100%" stop-color="#1f1404"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe480"/>
      <stop offset="50%" stop-color="#e8a72c"/>
