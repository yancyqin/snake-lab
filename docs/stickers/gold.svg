      <polygon points="0,-244 5,-236 -5,-236" transform="rotate(45)"/>
      <polygon points="0,-244 5,-236 -5,-236" transform="rotate(75)"/>
      <polygon points="0,-244 5,-236 -5,-236" transform="rotate(105)"/>
      <polygon points="0,-244 5,-236 -5,-236" transform="rotate(135)"/>
      <polygon points="0,-244 5,-236 -5,-236" transform="rotate(165)"/>
      <polygon points="0,-244 5,-236 -5,-236" transform="rotate(195)"/>
      <polygon points="0,-244 5,-236 -5,-236" transform="rotate(225)"/>
      <polygon points="0,-244 5,-236 -5,-236" transform="rotate(255)"/>
