    <path d="M 30 -11 L 33.2 -4.5 L 40.5 -3.4 L 35.2 1.7 L 36.5 8.9 L 30 4.6 L 23.5 8.9 L 24.8 1.7 L 19.5 -3.4 L 26.8 -4.5 Z"/>
  </g>

