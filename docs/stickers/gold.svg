      <polygon points="0,-248 8,-238 -8,-238" transform="rotate(150)"/>
      <polygon points="0,-248 8,-238 -8,-238" transform="rotate(180)"/>
      <polygon points="0,-248 8,-238 -8,-238" transform="rotate(210)"/>
      <polygon points="0,-248 8,-238 -8,-238" transform="rotate(240)"/>
      <polygon points="0,-248 8,-238 -8,-238" transform="rotate(270)"/>
      <polygon points="0,-248 8,-238 -8,-238" transform="rotate(300)"/>
