    <circle cx="-28" cy="-12" r="3" fill="#ff6b6b" stroke="#5e3c08" stroke-width="0.8"/>
    <circle cx="0" cy="-18" r="3.5" fill="#ff6b6b" stroke="#5e3c08" stroke-width="0.8"/>
    <circle cx="28" cy="-12" r="3" fill="#ff6b6b" stroke="#5e3c08" stroke-width="0.8"/>
    <rect x="-28" y="6" width="56" height="5" fill="#d59b20" stroke="#5e3c08" stroke-width="1"/>
