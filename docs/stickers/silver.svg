    <ellipse cx="65" cy="32" rx="16" ry="13" fill="#3e8a40" stroke="#1c4f1e" stroke-width="1.5"/>
    <circle cx="71" cy="27" r="3.5" fill="white"/>
    <circle cx="72" cy="27" r="2" fill="#0a0a0a"/>
    <path d="M 80 33 L 94 31 L 89 35 L 94 39 L 80 37 Z" fill="#e84444"/>
