<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="Snake Lab Silver prize sticker">
  <title>Snake Lab — Silver</title>
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f7fa"/>
      <stop offset="25%" stop-color="#c8cfd9"/>
      <stop offset="50%" stop-color="#eaeef3"/>
      <stop offset="75%" stop-color="#98a1af"/>
      <stop offset="100%" stop-color="#5d6776"/>
    </linearGradient>
    <radialGradient id="field" cx="0.5" cy="0.4" r="0.75">
      <stop offset="0%" stop-color="#33476a"/>
      <stop offset="100%" stop-color="#0c1424"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef1f6"/>
      <stop offset="50%" stop-color="#a8b1bf"/>
      <stop offset="100%" stop-color="#6d7787"/>
    </linearGradient>
    <linearGradient id="snake" x1="0" y1="0" x2="0" y2="1">
