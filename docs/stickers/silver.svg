  </text>

  <g fill="#7b8fac" opacity="0.55">
    <circle cx="118" cy="172" r="3"/>
    <circle cx="382" cy="172" r="3"/>
    <circle cx="104" cy="280" r="2"/>
    <circle cx="396" cy="280" r="2"/>
    <circle cx="158" cy="132" r="2"/>
    <circle cx="342" cy="132" r="2"/>
  </g>

  <g transform="translate(250,238)">
    <path d="M -65 -50 C -65 -92, 65 -92, 65 -50 C 65 -8, -65 -8, -65 32 C -65 74, 65 74, 65 32"
