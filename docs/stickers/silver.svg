  <circle cx="250" cy="250" r="240" fill="url(#ring)" stroke="#4f5867" stroke-width="2"/>
  <circle cx="250" cy="250" r="206" fill="url(#field)" stroke="#3a4252" stroke-width="1.5"/>

  <text font-family="Verdana, Geneva, sans-serif" font-size="28" font-weight="900" fill="#e3e7ed" letter-spacing="6">
