<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Snake Arena — v2</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #f1f5f9;
      font-family: -apple-system, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
      margin: 0;
      min-height: 100vh;
      touch-action: manipulation;
    }
    h1 { margin: 0 0 4px; font-size: 22px; }
    h2 { margin: 16px 0 8px; font-size: 16px; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; }

    .screen { width: 100%; display: flex; flex-direction: column; align-items: center; }
    .hidden { display: none !important; }

    /* ---- Lobby ---- */
    #lobby {
      max-width: 560px;
      padding: 12px;
    }
    .tagline {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 20px;
      text-align: center;
    }
    .panel {
      background: #1a1a2e;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 16px 20px;
      width: 100%;
      margin-bottom: 16px;
    }
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input[type="text"] {
      background: #0f0f1a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #f1f5f9;
      padding: 10px 12px;
      font-size: 16px;
      width: 100%;
      font-family: inherit;
    }
    input[type="text"]:focus { outline: none; border-color: #4ade80; }

    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-swatch {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: border-color 0.1s, transform 0.1s;
    }
    .color-swatch:hover { transform: scale(1.1); }
    .color-swatch.selected { border-color: #ffffff; }

    .room-list {
      list-style: none;
      padding: 0;
      margin: 0 0 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    .room-list li {
      background: #0f0f1a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .room-list li.empty { color: #64748b; text-align: center; font-size: 13px; }
    .room-list .room-name { font-weight: 600; }
    .room-list .room-count { color: #94a3b8; font-size: 13px; }
    .room-list .room-count.full { color: #f87171; }

    .create-row { display: flex; justify-content: center; }
    #createRoomBtn { width: 100%; padding: 12px; font-size: 16px; }

    button {
      background: #4ade80;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      min-height: 40px;
      font-family: inherit;
    }
    button:hover, button:active { background: #22c55e; }
    button:disabled, button.disabled {
      background: #334155; color: #64748b; cursor: not-allowed;
    }
    button.secondary {
      background: #1e293b;
      color: #f1f5f9;
    }
    button.secondary:hover { background: #334155; }

    /* ---- Game ---- */
    #gameScreen { padding-bottom: 24px; }
    .game-header {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .game-header .info {
      color: #94a3b8;
      font-size: 13px;
    }
    .game-header code {
      background: #1a1a2e; padding: 2px 6px; border-radius: 3px; color: #f1f5f9;
    }
    .game-header button { padding: 6px 12px; font-size: 12px; min-height: 32px; }

    .play-area {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
      max-width: 100%;
      justify-content: center;
    }
    canvas#game {
      border: 2px solid #334155;
      border-radius: 4px;
      background: #1a1a2e;
      display: block;
      touch-action: none;
      max-width: 100%;
      max-height: calc(100vh - 200px);
      height: auto;
      width: auto;
      image-rendering: pixelated;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 200px;
      max-width: 240px;
    }

    #scoreboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .scoreItem {
      background: #1a1a2e;
      border-left: 4px solid #4ade80;
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 13px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }
    .scoreItem.me { box-shadow: 0 0 0 2px #f1f5f9; }
    .scoreItem.dead { opacity: 0.4; }
    .scoreItem .name-cell { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .scoreItem strong { color: #4ade80; }
    .scoreItem .label { color: #64748b; font-size: 10px; letter-spacing: 0.05em; }

    .minimap-block { display: flex; flex-direction: column; gap: 6px; align-items: center; }
    canvas#minimap {
      border: 1px solid #334155;
      border-radius: 4px;
      background: #0f0f1a;
      display: block;
      max-width: 100%;
      height: auto;
    }
    .minimap-block .label { font-size: 11px; color: #64748b; letter-spacing: 0.05em; }

    /* Below ~1000px (tablet portrait, phone) the canvas+sidebar can't sit side by side.
       Stack the canvas, then put the sidebar below as a horizontal row. */
    @media (max-width: 1000px) {
      .play-area { flex-direction: column; align-items: center; }
      .sidebar { flex-direction: row; flex-wrap: wrap; justify-content: center; align-items: flex-start; max-width: 100%; min-width: 0; gap: 12px; }
      #scoreboard { flex-direction: row; flex-wrap: wrap; justify-content: center; }
    }

    #status {
      margin-top: 10px;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      min-height: 20px;
      text-align: center;
    }
    #status.win  { background: #14532d; color: #4ade80; }
    #status.lose { background: #7f1d1d; color: #fca5a5; }
    #status.info { background: #1e293b; color: #94a3b8; }
  </style>
</head>
<body>

  <!-- ============ LOBBY ============ -->
  <div id="lobby" class="screen">
    <h1>🐍 Snake Arena</h1>
    <div class="tagline">Multiplayer snake — up to 8 per room. Solo play gets a smart bot that gets dumber as it grows.</div>

    <div class="panel">
      <h2>Your snake</h2>
      <div class="field">
        <label for="nameInput">Name</label>
        <input id="nameInput" type="text" maxlength="12" placeholder="Yancy" autocomplete="off">
      </div>
      <div class="field">
        <label>Color</label>
        <div class="color-picker" id="colorPicker"></div>
      </div>
    </div>

    <div class="panel">
      <h2>Rooms</h2>
      <ul class="room-list" id="roomList">
        <li class="empty">No rooms yet — tap Create to start one</li>
      </ul>
      <div class="create-row">
        <button id="createRoomBtn">+ Create new room</button>
      </div>
    </div>
  </div>

  <!-- ============ GAME ============ -->
  <div id="gameScreen" class="screen hidden">
    <div class="game-header">
      <h1 style="margin:0; font-size:18px;">🐍 Snake Arena</h1>
      <div class="info">Room <code id="roomName">lobby</code></div>
      <button id="leaveBtn" class="secondary">Leave</button>
    </div>

    <div class="play-area">
      <canvas id="game"></canvas>
      <div class="sidebar">
        <div id="scoreboard"></div>
        <div class="minimap-block">
          <canvas id="minimap"></canvas>
          <div class="label">MINIMAP</div>
        </div>
      </div>
    </div>

    <div id="status"></div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
